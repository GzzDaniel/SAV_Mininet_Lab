frr version 9.1-MyOwnFRRVersion
frr defaults traditional
hostname vm-ubuntu
log syslog informational
ip forwarding
no ipv6 forwarding
!
router bgp 65004
 bgp router-id 10.3.0.2
 neighbor 10.3.0.1 remote-as 65003
 neighbor 10.4.0.1 remote-as 65001
 !
 address-family ipv4 unicast
  network 10.102.0.0/24
  neighbor 10.4.0.1 local-role peer
  neighbor 10.4.0.1 route-map ALOW-ALL in
  neighbor 10.4.0.1 route-map ALOW-ALL out
  neighbor 10.3.0.1 local-role provider
  neighbor 10.3.0.1 route-map ALOW-ALL in
  neighbor 10.3.0.1 route-map ALOW-ALL out
 exit-address-family
exit
!
route-map ALOW-ALL permit 100
exit
!
