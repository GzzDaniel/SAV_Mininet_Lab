frr version 9.1-MyOwnFRRVersion
frr defaults traditional
hostname vm-ubuntu
log syslog informational
ip forwarding
no ipv6 forwarding
!
router bgp 65002
 bgp router-id 10.1.0.2
 neighbor 10.1.0.1 remote-as 65001
 neighbor 10.2.0.2 remote-as 65003
 neighbor 10.5.0.2 remote-as 65005
 !
 address-family ipv4 unicast 
  network 10.1.0.0/24
  neighbor 10.1.0.1 local-role customer
  neighbor 10.1.0.1 route-map ALLOW-ALL in
  neighbor 10.1.0.1 route-map ALLOW-ALL out
  neighbor 10.5.0.2 local-role peer
  neighbor 10.5.0.2 route-map ALLOW-ALL in
  neighbor 10.5.0.2 route-map ALLOW-ALL out
  neighbor 10.2.0.2 local-role provider
  neighbor 10.2.0.2 route-map ALLOW-ALL in
  neighbor 10.2.0.2 route-map ALLOW-ALL out
 exit-address-family
exit
!
route-map ALLOW-ALL permit 100
exit
!
